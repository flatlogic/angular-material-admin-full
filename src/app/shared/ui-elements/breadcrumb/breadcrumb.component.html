<mat-card appearance="outlined" class="breadcrumb-card">
  <mat-card-content>
    <nav class="breadcrumb-list" aria-label="Breadcrumb">
      @for (elem of pathElements; track elem) {
        <span class="breadcrumb-list-item">
          <span class="text">{{ elem }}</span>
          <mat-icon class="icon" aria-hidden="true">keyboard_arrow_right</mat-icon>
        </span>
      }

      <span class="breadcrumb-list-item active" [routerLink]="path">
        <span class="text">{{ lastElement }}</span>
      </span>
    </nav>
  </mat-card-content>
</mat-card>
