<div class="toastr-wrapper">
  <div class="toastr-content">
    <div class="toastr-wrapper-icon">
      <mat-icon class="toastr-icon">email</mat-icon>
    </div>
    <p class="toastr-content__title">Message was not sent!</p>
  </div>
  <button
    type="button"
    class="toastr-wrapper-icon toastr-close-button"
    aria-label="Close notification"
    (click)="remove()"
  >
    <mat-icon class="toastr-icon">close</mat-icon>
  </button>
</div>
