<h2 mat-dialog-title class="title">Subscribe</h2>

<mat-dialog-content>
  <p class="text">
    To subscribe to this website, please enter your email address here. We will send updates occasionally.
  </p>

  <mat-form-field class="form">
    <input matInput placeholder="Email Address" [(ngModel)]="data.email">
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button class="button" mat-stroked-button color="primary" (click)="close()">CANCEL</button>
  <button class="button" mat-raised-button color="primary" [mat-dialog-close]="data.email">SUBSCRIBE</button>
</mat-dialog-actions>
