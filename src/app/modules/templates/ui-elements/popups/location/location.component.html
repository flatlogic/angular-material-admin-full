<h2 mat-dialog-title class="title">Use Google's location service?</h2>

<mat-dialog-content>
  <p class="text">
    Let Google help apps determine location. This means sending anonymous location data to Google, even when no
    apps are running.
  </p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button class="button" mat-stroked-button color="primary" (click)="close()">DISAGREE</button>
  <button class="button" mat-raised-button color="primary" (click)="close()">AGREE</button>
</mat-dialog-actions>
