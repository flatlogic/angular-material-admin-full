<h2 mat-dialog-title class="title">Successfully subscribed</h2>

<mat-dialog-content>
  <p class="text">
    You are subscribed as {{data.email}}.
  </p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button class="button" mat-flat-button (click)="close()">CANCEL</button>
  <button class="button" mat-flat-button (click)="close()">UNSUBSCRIBE</button>
</mat-dialog-actions>
