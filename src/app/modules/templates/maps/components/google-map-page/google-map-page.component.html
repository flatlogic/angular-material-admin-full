<app-breadcrumb [path]="routes.GOOGLE_MAP"></app-breadcrumb>

<mat-card appearance="outlined" class="card">
  <mat-card-content class="card-content">
    <iframe
      [src]="mapEmbedUrl"
      class="osm-map"
      title="OpenStreetMap"
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>
  </mat-card-content>
</mat-card>
