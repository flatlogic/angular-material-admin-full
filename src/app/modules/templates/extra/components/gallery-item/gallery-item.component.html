<mat-card appearance="outlined" class="card">
  <div class="media">
    <img [src]="img" [alt]="img" class="img">

    <div class="media-overlay"></div>

    <mat-card-footer class="icons-block">
      <button mat-mini-fab class="icon-wrapper" (click)="like()">
        <mat-icon class="icon" [ngClass]="{'icon-liked' : liked}">favorite</mat-icon>
      </button>
      <button mat-mini-fab class="icon-wrapper" (click)="comment()">
        <mat-icon class="icon" [ngClass]="{'icon-commented' : commented}">message</mat-icon>
      </button>
    </mat-card-footer>
  </div>
</mat-card>
