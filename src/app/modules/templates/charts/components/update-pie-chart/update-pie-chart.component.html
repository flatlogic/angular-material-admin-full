<div
  echarts
  [options]="echartsOptions"
  [style.height]="chartOptions?.chart?.height | chartSize:'350px'"
  [style.width]="chartOptions?.chart?.width | chartSize:'100%'"
></div>

<div class="button-wrapper">
  <button mat-flat-button color="primary" (click)="randomize()">randomize</button>
  <button mat-flat-button color="warn" (click)="appendData()">add</button>
  <button mat-flat-button color="accent" (click)="removeData()">remove</button>
  <button mat-flat-button color="success" (click)="reset()">reset</button>
</div>
